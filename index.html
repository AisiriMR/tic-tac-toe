<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic Tac Toe</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <h1 class="title">Tic&nbsp;Tac&nbsp;Toe</h1>

    <section class="scoreboard" aria-label="Scoreboard">
      <div class="score score--x" id="scoreX">
        <span class="score-label">Player X</span>
        <span class="score-value" id="scoreXValue">0</span>
      </div>
      <div class="score score--draw">
        <span class="score-label">Draws</span>
        <span class="score-value" id="scoreDrawValue">0</span>
      </div>
      <div class="score score--o" id="scoreO">
        <span class="score-label">Player O</span>
        <span class="score-value" id="scoreOValue">0</span>
      </div>
    </section>

    <p class="status" id="status" role="status" aria-live="polite">Player X's turn</p>

    <div class="board" id="board" role="grid" aria-label="Tic tac toe board">
      <button class="cell" data-index="0" role="gridcell" aria-label="Row 1, Column 1"></button>
      <button class="cell" data-index="1" role="gridcell" aria-label="Row 1, Column 2"></button>
      <button class="cell" data-index="2" role="gridcell" aria-label="Row 1, Column 3"></button>
      <button class="cell" data-index="3" role="gridcell" aria-label="Row 2, Column 1"></button>
      <button class="cell" data-index="4" role="gridcell" aria-label="Row 2, Column 2"></button>
      <button class="cell" data-index="5" role="gridcell" aria-label="Row 2, Column 3"></button>
      <button class="cell" data-index="6" role="gridcell" aria-label="Row 3, Column 1"></button>
      <button class="cell" data-index="7" role="gridcell" aria-label="Row 3, Column 2"></button>
      <button class="cell" data-index="8" role="gridcell" aria-label="Row 3, Column 3"></button>
    </div>

    <div class="controls">
      <button class="btn btn--primary" id="newRoundBtn">New Round</button>
      <button class="btn btn--secondary" id="resetBtn">Reset Scores</button>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
